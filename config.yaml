# ProxyLB Configuration
# ---------------------
# A high-performance proxy load balancer with multi-protocol inbound support.

inbound: {}

# Global filter settings
filter:
  enabled: true
  block_private_addresses: true
  backend: "direct-out"
  urls:
    - url: "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdns.txt"
      tag: "AdblockDNS"
  files:
    - "/etc/proxylb/custom-blocklist.txt"

# Multiple Inbound Listeners Reference
# ------------------------------------
# Each inbound can optionally specify a `route` field to bind it to a specific
# group or backend name. If omitted, the inbound uses the global `failover_order`.
#
# Routing topology example:
#
#   Inbound A (socks5 :1081)  ──route──▶  "proxy-group"   (urltest over US+EU)
#   Inbound B (ss :8389)      ──route──▶  "telegram-group" (failover US only)
#   Inbound C (http :8081)    ──(none)──▶  global failover_order (default)
#
inbounds:
  # ── Inbound A: binds to "proxy-group" ────────────────────────────────────────
  - type: socks5
    listen: "0.0.0.0:1081"
    username: "inbound-user"
    password: "inbound-password"
    route: "proxy-group"          # ◀ Bound to "proxy-group" (nested: region-us + region-eu)
    filter:
      enabled: false

  # ── Inbound B: binds to "telegram-group" ─────────────────────────────────────
  - type: shadowsocks
    listen: "0.0.0.0:8389"
    password: "another-password"
    method: "chacha20-ietf-poly1305"
    route: "telegram-group"       # ◀ Bound to "telegram-group" (failover: region-us → direct)

  - type: mtproto
    listen: "0.0.0.0:8443"
    password: "00000000000000000000000000000000"
    route: "telegram-group"       # ◀ Same group as Shadowsocks above

  # ── Inbound C: no route → uses global failover_order ─────────────────────────
  - type: http
    listen: "0.0.0.0:8081"
    username: "http-user"
    password: "http-password"
    # no `route` — falls back to global failover_order

  - type: socks5
    listen: "0.0.0.0:1082"
    # no `route` — falls back to global failover_order

  - type: socks5
    listen: "unix:///tmp/proxylb-socks5.sock"

  - type: shadowsocks
    listen: "unix:///tmp/proxylb-ss.sock"
    password: "another-password"
    method: "chacha20-ietf-poly1305"

  - type: http
    listen: "unix:///tmp/proxylb-http.sock"


# Global outbound interface to bind to (selection logic: backend specific -> global -> default)
# bind_interface: "eno" # Linux interface (or "en0" on macOS)

# All individual physical backends.
backends:
  # ── US region ────────────────────────────────────────────────────────────────
  - type: socks5
    address: "127.0.0.1:10800"
    name: "us-east-1"
    username: "user1"
    password: "pass1"

  - type: socks5
    address: "127.0.0.1:10801"
    name: "us-west-1"

  # ── EU region ────────────────────────────────────────────────────────────────
  - type: socks5
    address: "127.0.0.1:10802"
    name: "eu-west-1"
    username: "user3"
    password: "pass3"

  - type: socks5
    address: "127.0.0.1:10803"
    name: "eu-central-1"

  # ── Asia-Pacific region ──────────────────────────────────────────────────────
  - type: socks5
    address: "127.0.0.1:10804"
    name: "ap-east-1"

  - type: socks5
    address: "127.0.0.1:10805"
    name: "ap-southeast-1"

  # ── Special backends ─────────────────────────────────────────────────────────
  - type: socks5
    address: "unix:///run/my-proxy/socks5.sock"
    name: "local-socks5-uds"

  - type: direct
    name: "direct-out"
    force_healthy: true

  - type: ss
    address: "ss-server.example.com:8388"
    name: "ss-backend-1"
    username: "chacha20-ietf-poly1305"
    password: "my-shadowsocks-password"
    pool_size: 10

  - type: socks5
    address: "tls-socks5-server.example.com:10802"
    name: "backend-tls-1"
    username: "user"
    password: "pass"
    tls:
      server_name: "tls-socks5-server.example.com"
      insecure: false
    pool_size: 5


# Backend groups
# Strategy options:
#   urltest      - Pick the healthy member with lowest latency.
#   failover     - Try members in order; fall back to next if current is down.
#   loadbalance  - Distribute connections by least active connections.
#
# Members can be backend names OR other group names (nested groups).
#
# ┌──────────────────────────────────────────────────────────────────┐
# │                        Group Topology                           │
# │                                                                 │
# │  proxy-group (urltest)          telegram-group (failover)       │
# │  ├── region-us (urltest)        ├── region-us (urltest)         │
# │  │   ├── us-east-1              │   ├── us-east-1              │
# │  │   └── us-west-1              │   └── us-west-1              │
# │  └── region-eu (failover)       └── direct-out                  │
# │      ├── eu-west-1                                              │
# │      └── eu-central-1           global-fallback (failover)      │
# │                                  ├── proxy-group                │
# │  region-ap (loadbalance)         ├── region-ap                  │
# │  ├── ap-east-1                   └── direct-out                 │
# │  └── ap-southeast-1                                             │
# └──────────────────────────────────────────────────────────────────┘
groups:
  # ─── Leaf groups: physical backends only ─────────────────────────────────────
  - name: "region-us"
    strategy: "urltest"
    members:
      - "us-east-1"
      - "us-west-1"

  - name: "region-eu"
    strategy: "failover"
    members:
      - "eu-west-1"
      - "eu-central-1"

  - name: "region-ap"
    strategy: "loadbalance"
    members:
      - "ap-east-1"
      - "ap-southeast-1"

  # ─── Nested group A: used by Inbound A (socks5 :1081) ───────────────────────
  # Picks the fastest backend across US and EU regions.
  - name: "proxy-group"
    strategy: "urltest"
    members:
      - "region-us"               # nested group
      - "region-eu"               # nested group

  # ─── Nested group B: used by Inbound B (ss :8389, mtproto :8443) ─────────────
  # Tries US backends first; falls back to direct if all US are down.
  - name: "telegram-group"
    strategy: "failover"
    members:
      - "region-us"               # nested group (shared with proxy-group)
      - "direct-out"              # standalone backend

  # ─── Nested group C: used as the global fallback (Inbound C and others) ──────
  # Tries proxy-group first, then AP, then direct.
  - name: "global-fallback"
    strategy: "failover"
    members:
      - "proxy-group"             # nested group (itself contains nested groups)
      - "region-ap"               # nested group
      - "direct-out"              # standalone backend


# Global priority failover order.
# Used by inbounds that do NOT specify a `route` field.
# When an inbound has `route: "some-group"`, this global order is ignored for it.
failover_order:
  - "global-fallback"
  - "local-socks5-uds"

# Health check settings
health_check:
  interval_secs: 10
  timeout_secs: 5
  check_target: "http://www.gstatic.com/generate_204"

# Web status dashboard
web:
  enabled: true
  listen: "127.0.0.1:9090"

# CPU Affinity settings
cpu_affinity:
  worker_cores: [0, 1]
  ancillary_cores: [2]


advanced:
  zero_copy: true
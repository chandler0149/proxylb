# ProxyLB Configuration
# ---------------------
# A high-performance SOCKS5 proxy load balancer with Shadowsocks inbound support.

inbound:
  # Private address target filter (reject private/loopback targets if enabled)
  filter:
    enabled: true


# Multiple Inbound Listeners Reference
# ------------------------------------
# You can define multiple concurrent inbound listeners using the `inbounds` key.
# Legacy single `inbound` configuration keys defined above will merge with this list.
#
inbounds:
  - type: socks5
    listen: "0.0.0.0:1081"
    username: "inbound-user"     # Optional: SOCKS5 Username authentication
    password: "inbound-password" # Optional: SOCKS5 Password authentication
    # tls: auto                 # Optional: Auto-generate self-signed cert
    # tls:                      # Optional: Manual TLS Server config (SOCKS5-over-TLS)
    #   cert: "/etc/proxylb/certs/server.crt"
    #   key: "/etc/proxylb/certs/server.key"
    filter:
      enabled: false # Custom override to allow private targets for this listener

  - type: socks5
    listen: "unix:///tmp/proxylb-socks5.sock" # SOCKS5 inbound running over Unix Domain Socket

  - type: socks5
    listen: "0.0.0.0:1082"
    filter:
      enabled: false 

  - type: shadowsocks
    listen: "0.0.0.0:8389"
    password: "another-password"
    method: "chacha20-ietf-poly1305"
    # tls: auto                 # Optional: Auto-generate self-signed cert
    # tls:                      # Optional: Manual TLS Server config (Shadowsocks-over-TLS/wrapper)
    #   cert: "/etc/proxylb/certs/server.crt"
    #   key: "/etc/proxylb/certs/server.key"

  - type: shadowsocks
    listen: "unix:///tmp/proxylb-ss.sock" # Shadowsocks inbound running over Unix Domain Socket
    password: "another-password"
    method: "chacha20-ietf-poly1305"

  - type: http
    listen: "0.0.0.0:8081"
    username: "http-user"        # Optional: HTTP Proxy authentication
    password: "http-password"    # Optional: HTTP Proxy authentication
    # tls: auto                 # Optional: Auto-generate self-signed cert
    # tls:                      # Optional: Manual TLS Server config (HTTPS Proxy)
    #   cert: "/etc/proxylb/certs/server.crt"
    #   key: "/etc/proxylb/certs/server.key"

  - type: http
    listen: "unix:///tmp/proxylb-http.sock" # HTTP inbound running over Unix Domain Socket

# Global outbound interface to bind to (selection logic: backend specific -> global -> default)
# bind_interface: "eno" # Linux interface (or "en0" on macOS)

# All individual physical backends.
# Each backend must specify:
#   type:             "socks5", "ss", "uds", or "direct"
#   address:          "host:port", absolute path, or "unix://path" to support UDS/TCP transport
#   username/password: SOCKS5 credentials or Shadowsocks cipher-method/passphrase
backends:
  - type: socks5
    address: "127.0.0.1:10800"
    name: "backend-us-1"
    username: "user1"
    password: "pass1"
    # enabled: true # Whether this backend is initially active (default: true)

  - type: socks5
    address: "127.0.0.1:10801"
    name: "backend-us-2"
    # Example: Bind to a specific network interface
    # Forces all outbound connections through this interface (avoids using default route).
    # bind_interface: "eno" # Linux interface (or "en0" on macOS)

  # Example: SOCKS5 over Unix domain socket backend
  - type: socks5
    address: "unix:///run/my-proxy/socks5.sock"
    name: "local-socks5-uds"

  # Example: Legacy UDS backend type (remains compatible)
  - type: uds
    address: "/run/my-proxy/socks5-legacy.sock"
    name: "local-legacy-uds"

  # Example: Direct outbound connection
  # Connects directly to the target address without using any remote proxy backend.
  - type: direct
    name: "direct-out"

  # Example: Shadowsocks backend running over Unix domain socket
  - type: ss
    address: "unix:///run/my-proxy/ss.sock"
    name: "local-ss-uds"
    username: "chacha20-ietf-poly1305" # cipher method
    password: "my-shadowsocks-password"
    pool_size: 10

  # Example: Shadowsocks backend running over TCP
  - type: ss
    address: "ss-server.example.com:8388"
    name: "ss-backend-1"
    username: "chacha20-ietf-poly1305"
    password: "my-shadowsocks-password"
    pool_size: 10

  # Example: SOCKS5 backend with TLS client encryption
  - type: socks5
    address: "tls-socks5-server.example.com:10802"
    name: "backend-tls-1"
    username: "user"
    password: "pass"
    tls:
      server_name: "tls-socks5-server.example.com"
      insecure: false # set to true to disable certificate validation (not recommended)
    pool_size: 5

# Backend groups let you cluster individual backends.
# Strategy options:
#   urltest  - Dynamically routes to the healthy backend with the lowest health check latency.
#   failover - Routes in configured order: tries first backend, falls back to second if first is down.
groups:
  - name: "group-us"
    strategy: "urltest"
    backends:
      - "backend-us-1"
      - "backend-us-2"


# Global priority failover order.
# The load balancer attempts to resolve targets in this order.
# Targets can be group names or single ungrouped backend names.
# If omitted, default behavior falls back in sequential order: all groups first, followed by ungrouped backends.
failover_order:
  - "group-us"
  - "local-socks5-uds"
  - "direct-out"

# Health check settings
health_check:
  interval_secs: 10
  timeout_secs: 5
  check_target: "http://www.gstatic.com/generate_204"

# Web status dashboard
web:
  enabled: true
  listen: "127.0.0.1:9090"

# CPU Affinity settings
# Bind Tokio worker threads (main proxy traffic relay tasks) and ancillary threads
# (health check, candidate selection, status dashboard) to specific CPU cores.
cpu_affinity:
  worker_cores: [0, 1]      # Core IDs to pin worker threads (hot path)
  ancillary_cores: [2]     # Core IDs to pin ancillary/background tasks


# Experimental section
# AdBlock Guard settings
# ---------------------
# Enables domain name filtering on inbound requests.
# Supports AdGuard Home, ABP (Adblock Plus), and standard hosts file formats.
adblock:
  enabled: true
  # Optional: proxy backend or group name to fetch rule updates through.
  # If omitted, updates will be downloaded via direct connection.
  backend: "direct-out"
  # Remote rule lists to download and update periodically.
  urls:
    - "https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/SpiderFilter/sections/adservers.txt"
  # Local rule files on the disk.
  files:
    - "/etc/proxylb/custom-blocklist.txt"
  # Periodic update check interval for remote URLs (in hours).
  update_interval_hours: 24
